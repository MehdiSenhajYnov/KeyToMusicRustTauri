<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyToMusic</title>
    <style>
      /* Skeleton loader — replaced when React hydrates #root */
      .skeleton-app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #0f0f0f;
        color: #fff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .skeleton-header {
        height: 48px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
      }
      .skeleton-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .skeleton-sidebar {
        width: 224px;
        background: #1a1a1a;
        border-right: 1px solid #333;
        flex-shrink: 0;
        padding: 12px;
      }
      .skeleton-main {
        flex: 1;
        padding: 16px;
      }
      .sk-block {
        background: #252525;
        border-radius: 6px;
        animation: sk-pulse 1.5s ease-in-out infinite;
      }
      .sk-block-sm { height: 12px; }
      .sk-block-md { height: 20px; }
      .sk-block-lg { height: 32px; }
      .sk-block-xl { height: 48px; }
      .sk-w-20 { width: 80px; }
      .sk-w-32 { width: 128px; }
      .sk-w-full { width: 100%; }
      .sk-circle {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #252525;
        animation: sk-pulse 1.5s ease-in-out infinite;
      }
      .sk-mt-2 { margin-top: 8px; }
      .sk-mt-3 { margin-top: 12px; }
      .sk-mt-4 { margin-top: 16px; }
      .sk-gap-2 { gap: 8px; }
      .sk-gap-3 { gap: 12px; }
      .sk-flex { display: flex; }
      .sk-flex-col { flex-direction: column; }
      .sk-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
        gap: 6px;
      }
      .sk-key {
        aspect-ratio: 1;
        background: #252525;
        border-radius: 6px;
        animation: sk-pulse 1.5s ease-in-out infinite;
      }
      @keyframes sk-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static skeleton — replaced when React mounts -->
      <div class="skeleton-app">
        <div class="skeleton-header">
          <div class="sk-block sk-block-md sk-w-32"></div>
          <div style="flex:1"></div>
          <div class="sk-block sk-block-sm" style="width:100px"></div>
          <div class="sk-circle"></div>
        </div>
        <div class="skeleton-body">
          <div class="skeleton-sidebar">
            <div class="sk-block sk-block-sm sk-w-20"></div>
            <div class="sk-block sk-block-xl sk-w-full sk-mt-2"></div>
            <div class="sk-block sk-block-xl sk-w-full sk-mt-2"></div>
            <div class="sk-block sk-block-sm sk-w-20 sk-mt-4"></div>
            <div class="sk-block sk-block-lg sk-w-full sk-mt-2"></div>
            <div class="sk-block sk-block-lg sk-w-full sk-mt-2"></div>
          </div>
          <div class="skeleton-main">
            <div class="sk-flex sk-gap-3">
              <div class="sk-block sk-block-xl" style="flex:1"></div>
              <div class="sk-block sk-block-xl" style="flex:1"></div>
              <div class="sk-block sk-block-xl" style="flex:1"></div>
            </div>
            <div class="sk-block sk-block-sm sk-w-32 sk-mt-4"></div>
            <div class="sk-grid sk-mt-3">
              <div class="sk-key"></div><div class="sk-key"></div><div class="sk-key"></div>
              <div class="sk-key"></div><div class="sk-key"></div><div class="sk-key"></div>
              <div class="sk-key"></div><div class="sk-key"></div><div class="sk-key"></div>
              <div class="sk-key"></div><div class="sk-key"></div><div class="sk-key"></div>
              <div class="sk-key"></div><div class="sk-key"></div><div class="sk-key"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
