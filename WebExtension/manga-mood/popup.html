<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>KeyToMusic Mood</title>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818CF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <span>KeyToMusic Mood</span>
    </div>
    <div id="connection" class="status-dot" title="Checking..."></div>
  </div>

  <div class="section">
    <label class="toggle-row">
      <span>Mood Detection</span>
      <input type="checkbox" id="enableToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="section">
    <label class="field-label">API Port</label>
    <div class="port-row">
      <input type="number" id="portInput" min="1024" max="65535" value="8765">
      <button id="portSave" class="btn-sm">Save</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section stats">
    <div class="stat-row">
      <span class="stat-label">Status</span>
      <span id="serverStatus" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Last Mood</span>
      <span id="lastMood" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Pages Analyzed</span>
      <span id="pagesAnalyzed" class="stat-value">0</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <label class="field-label">Current Page</label>
    <div id="previewArea" class="preview-area">
      <div id="previewEmpty" class="preview-empty">No manga page detected</div>
      <img id="previewImg" class="preview-img" style="display:none" alt="Current page">
      <div id="previewOverlay" class="preview-overlay" style="display:none">
        <span id="previewPage" class="preview-page"></span>
        <span id="previewMood" class="preview-mood"></span>
      </div>
    </div>
    <div class="preview-actions">
      <button id="openImgBtn" class="btn-full" disabled>Open current image</button>
    </div>
  </div>

  <div class="divider"></div>

  <button id="injectBtn" class="btn-full">Activate on this page</button>
  <p class="hint">Use this on manga reader sites not auto-detected.</p>

  <script src="popup.js"></script>
</body>
</html>
